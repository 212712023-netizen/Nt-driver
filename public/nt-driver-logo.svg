<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect x="56" y="56" width="400" height="400" rx="80" fill="url(#bgGradient)"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2a44"/>
      <stop offset="100%" stop-color="#1fa2a6"/>
    </linearGradient>
  </defs>

  <!-- Steering Wheel -->
  <circle cx="256" cy="240" r="90" stroke="#4cc3ff" stroke-width="18" fill="none"/>
  <circle cx="256" cy="240" r="25" fill="#ffffff"/>

  <!-- Wheel spokes -->
  <line x1="256" y1="240" x2="256" y2="150" stroke="#ffffff" stroke-width="10"/>
  <line x1="256" y1="240" x2="190" y2="300" stroke="#ffffff" stroke-width="10"/>
  <line x1="256" y1="240" x2="322" y2="300" stroke="#ffffff" stroke-width="10"/>

  <!-- Coin -->
  <circle cx="180" cy="330" r="35" fill="#4CAF50"/>
  <text x="180" y="340" font-size="28" text-anchor="middle" fill="white" font-family="Arial">$</text>

  <!-- Document -->
  <rect x="300" y="300" width="60" height="80" rx="10" fill="#ffffff"/>
  <line x1="310" y1="320" x2="350" y2="320" stroke="#ccc" stroke-width="3"/>
  <line x1="310" y1="335" x2="350" y2="335" stroke="#ccc" stroke-width="3"/>

  <!-- Leaf -->
  <path d="M320 140 Q370 120 360 180 Q330 200 320 140" fill="#4CAF50"/>



</svg>
